sumo:
  target: dev
  outputs:
    dev:
      type: duckdb
      path: "{{ env_var('MOTHERDUCK_PATH', 'md:sumo_visualization') }}" # Parent MotherDuck database; schemas bronze/staging/analytics live under it
      motherduck_token: "{{ env_var('MOTHERDUCK_TOKEN') }}"
      schema: bronze # This is the default schema dbt will look in. Resulting Schema Name in MotherDuck will be "sumo.bronze"
      threads: 4